<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Match Flow</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- ==========================
         HEADER
    =========================== -->

    <header>

        <div class="logo">

            <!-- Replace with your Match Flow logo later -->
            <h1>Match Flow</h1>

            <p>Cardigan Town FC Summer Festival</p>

        </div>

        <div class="crest">

            <!-- Replace with club crest PNG -->
            <img src="assets/images/club-crest.png"
                 alt="Club Crest"
                 onerror="this.style.display='none';">

        </div>

    </header>

    <!-- ==========================
         MAIN CONTENT
    =========================== -->

    <div class="content">

        <!-- ==========================
             SIDEBAR
        =========================== -->

        <aside>

            <!-- Tournament Mascot -->

            <div class="mascot tournament">

                <img src="assets/images/tournament-mascot.png"
                     alt="Tournament Mascot"
                     onerror="this.style.display='none';">

            </div>

            <!-- LIVE -->

            <div class="info">

                <h3>LIVE</h3>

                <h2 id="currentDivision">

                    Loading...

                </h2>

            </div>

            <!-- NEXT -->

            <div class="info">

                <h3>NEXT</h3>

                <h2 id="nextDivision">

                    Loading...

                </h2>

            </div>

            <!-- Progress -->

            <div class="info">

                <h3>DISPLAY PROGRESS</h3>

                <div class="progress-track">

                    <div id="progressBar"></div>

                </div>

            </div>

            <!-- Match Flow Mascot -->

            <div class="mascot matchflow">

                <img src="assets/images/matchflow-dragon.png"
                     alt="Match Flow Dragon"
                     onerror="this.style.display='none';">

            </div>

        </aside>

        <!-- ==========================
             DISPLAY
        =========================== -->

        <main>

            <iframe

                id="leagueFrame"

                title="Tournament Display"

                loading="eager"

                allowfullscreen>

            </iframe>

        </main>

    </div>

    <!-- ==========================
         FOOTER
    =========================== -->

    <footer>

        <div class="ticker">

            <div id="tickerText">

                Welcome to the Cardigan Town FC Summer Festival

            </div>

        </div>

    </footer>

    <script src="script.js"></script>

</body>

</html>
