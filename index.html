</head>

<header>

<div class="logo">

<div class="crest">

</div>

</header>

<div class="content">

</div>

    <div class="progress-track">
        <div id="progressBar"></div>
    </div>

</div>

</aside>

<iframe
    id="leagueFrame"
    src="https://cardigantownfc.torneopal.com/taso/sarja.php?turnaus=482_0004&sarja=U6"
